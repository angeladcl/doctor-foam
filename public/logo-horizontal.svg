<svg viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Minimal flat bubbles icon -->
  <circle cx="30" cy="46" r="20" fill="none" stroke="url(#blueGradH)" stroke-width="2.2" opacity="0.9"/>
  <circle cx="30" cy="46" r="14" fill="url(#blueGradH)" opacity="0.08"/>

  <circle cx="50" cy="26" r="9" fill="none" stroke="url(#blueGradH)" stroke-width="1.5" opacity="0.65"/>
  <circle cx="52" cy="68" r="7" fill="url(#blueGradH)" opacity="0.15"/>
  <circle cx="12" cy="30" r="5" fill="url(#blueGradH)" opacity="0.12"/>

  <!-- DOCTOR text — white fill + blue outline -->
  <text x="80" y="42" font-family="Outfit, sans-serif" font-weight="800" font-size="28" fill="#ffffff" stroke="url(#blueGradH)" stroke-width="1" letter-spacing="0.12em" paint-order="stroke">DOCTOR</text>

  <!-- FOAM text — blue gradient -->
  <text x="80" y="78" font-family="Outfit, sans-serif" font-weight="800" font-size="36" fill="url(#blueGradH)" letter-spacing="0.18em">FOAM</text>

  <!-- Tagline -->
  <text x="255" y="65" font-family="Inter, sans-serif" font-weight="400" font-size="10" fill="#64748b" letter-spacing="0.15em">PREMIUM DETAILING</text>
</svg>
